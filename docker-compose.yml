# NaiaTrade — Docker Compose
# Development environment
# Production: use separate docker-compose.prod.yml

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: naiatrade-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-naiatrade}
      POSTGRES_USER: ${POSTGRES_USER:-naiatrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-naiatrade}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naiatrade}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: naiatrade-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

